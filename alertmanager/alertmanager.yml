# Alertmanager Configuration
# Telegram notification setup:
#   1. Create a bot via @BotFather on Telegram and get YOUR_TELEGRAM_BOT_TOKEN
#   2. Send a message to your bot, then visit:
#      https://api.telegram.org/bot<YOUR_TOKEN>/getUpdates
#      to find YOUR_TELEGRAM_CHAT_ID
#   3. Replace the placeholders below

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'telegram'

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: 'YOUR_TELEGRAM_BOT_TOKEN'
        chat_id: YOUR_TELEGRAM_CHAT_ID
        parse_mode: 'HTML'
        send_resolved: true
        message: '{{ template "telegram.default.message" . }}'
